<!DOCTYPE html>
<html>
<head>
<title>South Indian Recipes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#FFF8E7;
margin:0;
}

/* HEADER */
header,footer{
background:#8B0000;
color:white;
text-align:center;
padding:18px;
}

/* NAVBAR */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
}

.search input{
padding:10px;
border:none;
border-radius:20px;
width:250px;
}

.nav a{
color:white;
margin-left:15px;
text-decoration:none;
font-weight:500;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

/* CARD */
.card{
position:relative;
overflow:hidden;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,.2);
transition:.4s;
cursor:pointer;
}

.card img{
width:100%;
height:230px;
object-fit:cover;
transition:.5s;
}

/* HOVER FOOD ZOOM */
.card:hover img{
transform:scale(1.12);
}

/* GRADIENT CAPTION */
.caption{
position:absolute;
bottom:0;
width:100%;
padding:20px;
color:white;
font-size:22px;
font-weight:600;
background:linear-gradient(transparent,rgba(0,0,0,.8));
}

footer{
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="nav">

<form action="/search" class="search">
<input type="text" name="q" placeholder="Search recipes...">
</form>

<div>
{% if user %}
<a href="/profile">👤 Profile</a>
<a href="/logout">Logout</a>
{% else %}
<a href="/login">Login</a>
<a href="/signup">Signup</a>
{% endif %}
</div>

</div>

<h1>Taste the Tradition of South Indian States</h1>

</header>


<div class="grid">

<a href="/categories/Andhra Pradesh" class="card">
<img src="{{ url_for('static', filename='category_images/andhra.jpg') }}">
<div class="caption">Andhra Pradesh</div>
</a>

<a href="/categories/Telangana" class="card">
<img src="{{ url_for('static', filename='category_images/telangana.jpg') }}">
<div class="caption">Telangana</div>
</a>

<a href="/categories/Tamil Nadu" class="card">
<img src="{{ url_for('static', filename='category_images/tamilnadu.jpg') }}">
<div class="caption">Tamil Nadu</div>
</a>

<a href="/categories/Kerala" class="card">
<img src="{{ url_for('static', filename='category_images/kerala.jpg') }}">
<div class="caption">Kerala</div>
</a>

<a href="/categories/Karnataka" class="card">
<img src="{{ url_for('static', filename='category_images/karnataka.jpg') }}">
<div class="caption">Karnataka</div>
</a>

</div>

<footer>
🍛 Food is memory, culture, and celebration.
</footer>

</body>
</html>
