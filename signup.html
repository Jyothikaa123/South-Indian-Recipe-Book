<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
font-family:Poppins;
background:#FFF8E7;
display:flex;
flex-direction:column;
align-items:center;
}

header,footer{
background:#8B0000;
color:white;
width:100%;
text-align:center;
padding:15px;
}

form{
background:white;
padding:30px;
margin:40px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

input,button{
display:block;
margin:10px 0;
padding:10px;
width:250px;
}
</style>
</head>

<body>

<header>
<h2>Welcome Back</h2>
<p>Login to save your favourite dishes</p>
</header>

<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
<a href="/signup">Create Account</a>
</form>

<footer>
<p>🌿 Save flavours you love and revisit anytime.</p>
</footer>

</body>
</html>
